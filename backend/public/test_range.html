<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #121212; padding: 50px; }
  .eq-graph { display: flex; height: 150px; width: 400px; gap: 16px; position: relative; }
  .eq-bands { flex: 1; display: flex; position: relative; }
  .eq-bands::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #333; z-index: 1; }
  .eq-band { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; border: 1px solid red; }
  
  .eq-band input[type=range] {
    -webkit-appearance: none;
    background: rgba(255,255,255,0.2);
    width: 150px;
    height: 150px;
    transform: rotate(-90deg);
    position: absolute;
    z-index: 10;
    margin: 0;
    padding: 0;
  }
  .eq-band input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 12px;
    width: 12px;
    border-radius: 50%;
    background: #fff;
    margin-top: -5px;
  }
  .eq-band input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 2px;
    background: #555;
  }
  .eq-band-fill {
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    background: rgba(30,215,96,0.5);
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="eq-graph">
    <div class="eq-bands">
      <div class="eq-band">
        <input type="range" min="-12" max="12" value="3">
        <div class="eq-band-fill" style="height: 62.5%;"></div>
      </div>
    </div>
  </div>
</body>
</html>
